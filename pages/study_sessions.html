<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Study Sessions</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div id="sidebar"></div>

    <div id="content">

        <h1>Study Sessions</h1>

        <div class="form-box">

            <input id="subject" placeholder="Subject">

            <input id="date" type="date">

            <input id="minutes" placeholder="Minutes">

            <input id="focus" placeholder="Focus (1-10)">

            <input id="studyMethod" placeholder="Study Method">

            <input id="rating" placeholder="Rating (1-5)">

            <input id="chapter" placeholder="Chapter">

            <button onclick="addSession()">
                Add Session
            </button>

        </div>

        <div id="sessionList"></div>

        <!-- EDIT SESSION MODAL -->

        <div id="editModal" class="modal hidden">

            <div class="modal-content">

                <h2>Edit Study Session</h2>

                <input id="editSubject" placeholder="Subject">

                <input id="editChapter" placeholder="Chapter">

                <input id="editDate" type="date">

                <input id="editMinutes" placeholder="Minutes">

                <input id="editFocus" placeholder="Focus (1-10)">

                <input id="editStudyMethod" placeholder="Study Method">

                <input id="editRating" placeholder="Rating (1-5)">

                <div class="modal-buttons">

                    <button onclick="saveEdit()">
                        Save
                    </button>

                    <button onclick="closeEditModal()">
                        Cancel
                    </button>

                </div>

            </div>

        </div>
    </div>

    <script src="../js/nav.js"></script>
    <script src="../js/study_sessions.js"></script>

    <script>
        loadSidebar();
        loadSessions();
    </script>

</body>

</html>
